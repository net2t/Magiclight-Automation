name: MagicLight Generation Pipeline

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run Mode'
        required: true
        default: 'combined'
        type: choice
        options:
          - combined
          - generate
          - process
      quantity:
        description: 'Stories to process (0 = all pending)'
        required: true
        default: '1'
        type: string
      upload_drive:
        description: 'Upload to Google Drive?'
        required: true
        default: true
        type: boolean
      loop:
        description: 'Loop mode (runs until all pending done or cancelled)?'
        required: true
        default: false
        type: boolean
      debug:
        description: 'Enable debug logging?'
        required: false
        default: false
        type: boolean

  # ── Scheduled Run ──────────────────────────────────────────────────────────
  # Runs hourly automatically (combined + headless + upload-drive)
  schedule:
    - cron: "0 * * * *"

concurrency:
  group: magiclight-pipeline
  cancel-in-progress: true   # New run cancels any already-running job

jobs:
  run-pipeline:
    runs-on: ubuntu-latest       # Linux = faster + cheaper + better Playwright support
    timeout-minutes: 360         # 6 hours max per run

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. System dependencies (Linux only — needed for Playwright) ──────────
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          # libasound2 was renamed to libasound2t64 in Ubuntu 24.04 (Noble)
          # Try the new name first, fall back to old name for older images
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libdbus-1-3 libexpat1 libxcb1 libxkbcommon0 \
            libx11-6 libxcomposite1 libxdamage1 libxext6 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libxshmfence1 ffmpeg \
            $(apt-cache show libasound2t64 &>/dev/null && echo libasound2t64 || echo libasound2)

      # ── 4. pip install ───────────────────────────────────────────────────────
      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      # ── 5. Playwright chromium ───────────────────────────────────────────────
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      # ── 6. Write secrets to files ────────────────────────────────────────────
      # Required secrets (must be set in repo Settings → Secrets → Actions):
      #   GCP_CREDENTIALS  → full JSON of Google service account key file
      #   ENV_FILE         → full content of your .env file
      #   ACCOUNTS_TXT     → content of accounts.txt (email:password lines)
      # Optional secrets:
      #   OAUTH_CREDENTIALS → oauth_credentials.json (if using OAuth instead of SA)
      #   OAUTH_TOKEN       → token.json (saved OAuth token — avoids browser auth)
      - name: Write Secret Files
        env:
          GCP_CREDENTIALS:   ${{ secrets.GCP_CREDENTIALS }}
          ENV_FILE:          ${{ secrets.ENV_FILE }}
          ACCOUNTS_TXT:      ${{ secrets.ACCOUNTS_TXT }}
          OAUTH_CREDENTIALS: ${{ secrets.OAUTH_CREDENTIALS }}
          OAUTH_TOKEN:       ${{ secrets.OAUTH_TOKEN }}
        run: |
          [ -n "$GCP_CREDENTIALS" ]   && printf '%s' "$GCP_CREDENTIALS"   > credentials.json      && echo "✅ credentials.json written"
          [ -n "$ENV_FILE" ]          && printf '%s' "$ENV_FILE"          > .env                  && echo "✅ .env written"
          [ -n "$ACCOUNTS_TXT" ]      && printf '%s' "$ACCOUNTS_TXT"      > accounts.txt          && echo "✅ accounts.txt written"
          [ -n "$OAUTH_CREDENTIALS" ] && printf '%s' "$OAUTH_CREDENTIALS" > oauth_credentials.json && echo "✅ oauth_credentials.json written"
          [ -n "$OAUTH_TOKEN" ]       && printf '%s' "$OAUTH_TOKEN"       > token.json            && echo "✅ token.json written"

      # ── 7. Inject repo Variables into .env (override if needed) ─────────────
      # Priority order for SHEET_ID:
      #   1. GitHub Repo Variable  SHEET_ID  (Settings → Variables → Actions)
      #   2. GitHub Secret         SHEET_ID
      #   3. Already present in    ENV_FILE  secret
      - name: Inject Env Variables from GitHub Repo Variables
        env:
          VAR_SHEET_ID:          ${{ vars.SHEET_ID }}
          VAR_SHEET_NAME:        ${{ vars.SHEET_NAME }}
          VAR_DRIVE_FOLDER_ID:   ${{ vars.DRIVE_FOLDER_ID }}
          VAR_LOCAL_OUTPUT:      ${{ vars.LOCAL_OUTPUT_ENABLED }}
          SECRET_SHEET_ID:       ${{ secrets.SHEET_ID }}
        run: |
          touch .env

          # ── Normalize Windows \r\n → \n ──────────────────────────────────────
          tr -d '\r' < .env > /tmp/env_clean && mv /tmp/env_clean .env

          # ── inject_line: remove old key then append clean value ─────────────
          inject_line() {
            local key="$1" val="$2"
            if [ -z "$val" ]; then
              echo "[inject] SKIP  $key (no value provided)"
              return
            fi
            # Remove any existing line for this key (grep -v is portable)
            grep -v "^${key}=" .env > /tmp/env_tmp 2>/dev/null && mv /tmp/env_tmp .env || true
            # Append the new value with a clean newline
            printf '%s=%s\n' "$key" "$val" >> .env
            echo "[inject] SET   ${key}=${val:0:12}..."
          }

          SHEET_ID_FINAL="${VAR_SHEET_ID:-$SECRET_SHEET_ID}"
          inject_line "SHEET_ID"             "$SHEET_ID_FINAL"
          inject_line "SHEET_NAME"           "$VAR_SHEET_NAME"
          inject_line "DRIVE_FOLDER_ID"      "$VAR_DRIVE_FOLDER_ID"
          inject_line "LOCAL_OUTPUT_ENABLED" "${VAR_LOCAL_OUTPUT:-false}"

          # ── Preflight check ─────────────────────────────────────────────────
          echo ""
          echo "[preflight] .env size: $(wc -c < .env) bytes, lines: $(wc -l < .env)"
          echo "[debug] All keys in .env:"
          grep -v '^\s*#' .env | grep '=' | cut -d= -f1 | sort || true

          FOUND_ID="$(grep '^SHEET_ID=' .env | cut -d= -f2- | tr -d '\r\n' | head -c 40)"
          if [ -z "$FOUND_ID" ]; then
            echo ""
            echo "❌ SHEET_ID missing from .env"
            echo "   → Add repo Variable SHEET_ID: repo Settings → Secrets and variables → Actions → Variables tab"
            echo "   → OR include SHEET_ID=... in your ENV_FILE secret"
            exit 1
          fi
          echo "✅ Preflight passed — SHEET_ID=${FOUND_ID:0:8}..."

      # ── 8. Run pipeline ──────────────────────────────────────────────────────
      - name: Run MagicLight Pipeline
        env:
          DISPLAY: ":99"          # Linux headless display (Playwright handles this)
        run: |
          # Scheduled vs manual detection
          EVENT="${{ github.event_name }}"

          if [ "$EVENT" = "schedule" ]; then
            MODE="combined"
            QTY="1"
            UPLOAD_DRIVE="true"
            LOOP="false"
            DEBUG_FLAG=""
            echo "[scheduler] Auto: combined --max 1 --headless --upload-drive"
          else
            MODE="${{ github.event.inputs.mode }}"
            MODE="${MODE:-combined}"
            QTY="${{ github.event.inputs.quantity }}"
            QTY="${QTY:-1}"
            UPLOAD_DRIVE="${{ github.event.inputs.upload_drive }}"
            UPLOAD_DRIVE="${UPLOAD_DRIVE:-true}"
            LOOP="${{ github.event.inputs.loop }}"
            LOOP="${LOOP:-false}"
            DEBUG="${{ github.event.inputs.debug }}"
            DEBUG="${DEBUG:-false}"
            [ "$DEBUG" = "true" ] && DEBUG_FLAG="--debug" || DEBUG_FLAG=""
            echo "[manual] Mode=$MODE Qty=$QTY Drive=$UPLOAD_DRIVE Loop=$LOOP Debug=$DEBUG"
          fi

          # Build args
          ARGS="--mode $MODE --max $QTY --headless"
          [ "$UPLOAD_DRIVE" = "true" ] && ARGS="$ARGS --upload-drive"
          [ "$LOOP" = "true" ]         && ARGS="$ARGS --loop"
          [ -n "$DEBUG_FLAG" ]         && ARGS="$ARGS $DEBUG_FLAG"

          echo "[run] python main.py $ARGS"
          python main.py $ARGS 2>&1 | tee pipeline.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit $EXIT_CODE

      # ── 9. Upload artifacts (always — even on failure for debugging) ─────────
      - name: Upload Pipeline Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: magiclight-output-${{ github.run_number }}
          path: |
            output/**
            output/screenshots/**
            *.log
          if-no-files-found: ignore
          retention-days: 7