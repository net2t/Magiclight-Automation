name: MagicLight Generation Pipeline

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run Mode'
        required: true
        default: 'combined'
        type: choice
        options:
          - combined
          - generate
          - process
      quantity:
        description: 'Quantity Limit (0 = All Pending)'
        required: true
        default: '1'
        type: string
      upload_drive:
        description: 'Upload matching videos to Google Drive?'
        required: true
        default: true
        type: boolean
      loop:
        description: 'Run on continuous Loop Mode until manually cancelled?'
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: magiclight-pipeline
  cancel-in-progress: true

jobs:
  run-pipeline:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt
        
      - name: Install Playwright Browsers
        run: playwright install chromium

      - name: Set up FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          architecture: x64

      - name: Decode API Credentials
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          ENV_FILE: ${{ secrets.ENV_FILE }}
          ACCOUNTS_TXT: ${{ secrets.ACCOUNTS_TXT }}
        run: |
          if ($env:GCP_CREDENTIALS -ne $null -and $env:GCP_CREDENTIALS.Trim() -ne "") {
              $env:GCP_CREDENTIALS | Out-File -FilePath credentials.json -Encoding utf8 -NoNewline
          }
          if ($env:ENV_FILE -ne $null -and $env:ENV_FILE.Trim() -ne "") {
              $env:ENV_FILE | Out-File -FilePath .env -Encoding utf8 -NoNewline
          }
          if ($env:ACCOUNTS_TXT -ne $null -and $env:ACCOUNTS_TXT.Trim() -ne "") {
              $env:ACCOUNTS_TXT | Out-File -FilePath accounts.txt -Encoding utf8 -NoNewline
          }

      - name: Run MagicLight Pipeline
        shell: pwsh
        env:
          GITHUB_ACTIONS: "true"
        run: |
          $mode = "${{ github.event.inputs.mode }}"
          if (-not $mode) { $mode = "combined" }

          $qty = "${{ github.event.inputs.quantity }}"
          if (-not $qty) { $qty = "1" }

          $uploadDrive = "${{ github.event.inputs.upload_drive }}"
          if (-not $uploadDrive) { $uploadDrive = "true" }

          $loop = "${{ github.event.inputs.loop }}"
          if (-not $loop) { $loop = "false" }

          $argsStr = "--mode $mode --max $qty --headless"
          if ($uploadDrive -eq "true") {
              $argsStr += " --upload-drive"
          }
          if ($loop -eq "true") {
              $argsStr += " --loop"
          }
          
          Invoke-Expression "python main.py $argsStr"

      - name: Upload Pipeline Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: magiclight-output
          path: |
            output/**
            *.log