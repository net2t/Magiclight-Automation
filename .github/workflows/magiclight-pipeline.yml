name: MagicLight Generation Pipeline

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run Mode'
        required: true
        default: 'combined'
        type: choice
        options:
          - combined
          - generate
          - process
      quantity:
        description: 'Stories to process (0 = all pending)'
        required: true
        default: '1'
        type: string
      upload_drive:
        description: 'Upload to Google Drive?'
        required: true
        default: true
        type: boolean
      loop:
        description: 'Loop mode (runs until all pending done or cancelled)?'
        required: true
        default: false
        type: boolean
      debug:
        description: 'Enable debug logging?'
        required: false
        default: false
        type: boolean

  # ── Scheduled Run ──────────────────────────────────────────────────────────
  # Runs hourly automatically (combined + headless + upload-drive)
  schedule:
    - cron: "0 * * * *"

concurrency:
  group: magiclight-pipeline
  cancel-in-progress: true   # New run cancels any already-running job

jobs:
  run-pipeline:
    runs-on: ubuntu-latest       # Linux = faster + cheaper + better Playwright support
    timeout-minutes: 360         # 6 hours max per run

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. System dependencies (Linux only — needed for Playwright) ──────────
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libdbus-1-3 libexpat1 libxcb1 libxkbcommon0 \
            libx11-6 libxcomposite1 libxdamage1 libxext6 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2 libxshmfence1 \
            ffmpeg

      # ── 4. pip install ───────────────────────────────────────────────────────
      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      # ── 5. Playwright chromium ───────────────────────────────────────────────
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      # ── 6. Write secrets to files ────────────────────────────────────────────
      # Required secrets (must be set in repo Settings → Secrets → Actions):
      #   GCP_CREDENTIALS  → full JSON of Google service account key file
      #   ENV_FILE         → full content of your .env file
      #   ACCOUNTS_TXT     → content of accounts.txt (email:password lines)
      # Optional secrets:
      #   OAUTH_CREDENTIALS → oauth_credentials.json (if using OAuth instead of SA)
      #   OAUTH_TOKEN       → token.json (saved OAuth token — avoids browser auth)
      - name: Write Secret Files
        env:
          GCP_CREDENTIALS:   ${{ secrets.GCP_CREDENTIALS }}
          ENV_FILE:          ${{ secrets.ENV_FILE }}
          ACCOUNTS_TXT:      ${{ secrets.ACCOUNTS_TXT }}
          OAUTH_CREDENTIALS: ${{ secrets.OAUTH_CREDENTIALS }}
          OAUTH_TOKEN:       ${{ secrets.OAUTH_TOKEN }}
        run: |
          [ -n "$GCP_CREDENTIALS" ]   && printf '%s' "$GCP_CREDENTIALS"   > credentials.json      && echo "✅ credentials.json written"
          [ -n "$ENV_FILE" ]          && printf '%s' "$ENV_FILE"          > .env                  && echo "✅ .env written"
          [ -n "$ACCOUNTS_TXT" ]      && printf '%s' "$ACCOUNTS_TXT"      > accounts.txt          && echo "✅ accounts.txt written"
          [ -n "$OAUTH_CREDENTIALS" ] && printf '%s' "$OAUTH_CREDENTIALS" > oauth_credentials.json && echo "✅ oauth_credentials.json written"
          [ -n "$OAUTH_TOKEN" ]       && printf '%s' "$OAUTH_TOKEN"       > token.json            && echo "✅ token.json written"

      # ── 7. Inject repo Variables into .env (override if needed) ─────────────
      # These can be set as GitHub Repo Variables (not secrets) for easy editing:
      #   SHEET_ID, SHEET_NAME, DRIVE_FOLDER_ID, LOCAL_OUTPUT_ENABLED
      - name: Inject Env Variables from GitHub Repo Variables
        env:
          SHEET_ID:             ${{ vars.SHEET_ID }}
          SHEET_NAME:           ${{ vars.SHEET_NAME }}
          DRIVE_FOLDER_ID:      ${{ vars.DRIVE_FOLDER_ID }}
          LOCAL_OUTPUT_ENABLED: ${{ vars.LOCAL_OUTPUT_ENABLED }}
          SHEET_ID_SECRET:      ${{ secrets.SHEET_ID }}
        run: |
          touch .env

          inject_line() {
            local key="$1" val="$2"
            [ -z "$val" ] && return
            if grep -q "^${key}=" .env 2>/dev/null; then
              sed -i "s|^${key}=.*|${key}=${val}|" .env
            else
              echo "${key}=${val}" >> .env
            fi
          }

          SHEET_ID_FINAL="${SHEET_ID:-$SHEET_ID_SECRET}"
          inject_line "SHEET_ID"             "$SHEET_ID_FINAL"
          inject_line "SHEET_NAME"           "$SHEET_NAME"
          inject_line "DRIVE_FOLDER_ID"      "$DRIVE_FOLDER_ID"
          inject_line "LOCAL_OUTPUT_ENABLED" "${LOCAL_OUTPUT_ENABLED:-false}"

          echo "[preflight] .env size: $(wc -c < .env) bytes"

          if ! grep -qE '^\s*SHEET_ID\s*=\s*.+' .env; then
            echo "❌ SHEET_ID missing from .env — set repo Variable SHEET_ID or Secret ENV_FILE"
            exit 1
          fi
          echo "✅ Preflight passed — SHEET_ID is set"

      # ── 8. Run pipeline ──────────────────────────────────────────────────────
      - name: Run MagicLight Pipeline
        env:
          DISPLAY: ":99"          # Linux headless display (Playwright handles this)
        run: |
          # Scheduled vs manual detection
          EVENT="${{ github.event_name }}"

          if [ "$EVENT" = "schedule" ]; then
            MODE="combined"
            QTY="1"
            UPLOAD_DRIVE="true"
            LOOP="false"
            DEBUG_FLAG=""
            echo "[scheduler] Auto: combined --max 1 --headless --upload-drive"
          else
            MODE="${{ github.event.inputs.mode }}"
            MODE="${MODE:-combined}"
            QTY="${{ github.event.inputs.quantity }}"
            QTY="${QTY:-1}"
            UPLOAD_DRIVE="${{ github.event.inputs.upload_drive }}"
            UPLOAD_DRIVE="${UPLOAD_DRIVE:-true}"
            LOOP="${{ github.event.inputs.loop }}"
            LOOP="${LOOP:-false}"
            DEBUG="${{ github.event.inputs.debug }}"
            DEBUG="${DEBUG:-false}"
            [ "$DEBUG" = "true" ] && DEBUG_FLAG="--debug" || DEBUG_FLAG=""
            echo "[manual] Mode=$MODE Qty=$QTY Drive=$UPLOAD_DRIVE Loop=$LOOP Debug=$DEBUG"
          fi

          # Build args
          ARGS="--mode $MODE --max $QTY --headless"
          [ "$UPLOAD_DRIVE" = "true" ] && ARGS="$ARGS --upload-drive"
          [ "$LOOP" = "true" ]         && ARGS="$ARGS --loop"
          [ -n "$DEBUG_FLAG" ]         && ARGS="$ARGS $DEBUG_FLAG"

          echo "[run] python main.py $ARGS"
          python main.py $ARGS 2>&1 | tee pipeline.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit $EXIT_CODE

      # ── 9. Upload artifacts (always — even on failure for debugging) ─────────
      - name: Upload Pipeline Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: magiclight-output-${{ github.run_number }}
          path: |
            output/**
            output/screenshots/**
            *.log
          if-no-files-found: ignore
          retention-days: 7